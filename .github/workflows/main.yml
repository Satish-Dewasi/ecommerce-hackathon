name: CI/CD Pipeline - Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**" # ✅ Only triggers when backend files change
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22.x"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json # ✅ Points to backend

      - name: Install dependencies
        working-directory: ./backend # ✅ Runs inside backend folder
        run: npm ci

      # Uncomment when ready:
      # - name: Run tests
      #   working-directory: ./backend
      #   run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy Backend to Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
